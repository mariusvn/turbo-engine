name: build

on:
  push:
  pull_request:

env:
  # vcpkg builds Allegro 5 + transitive deps from source. Point its binary
  # cache at a fixed directory so actions/cache can persist the compiled
  # packages across runs (see the "Cache vcpkg packages" step below).
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
  # Some runners ship CMake 4.x, which rejects projects whose
  # cmake_minimum_required predates 3.5 (e.g. the physfs port pulled in by
  # Allegro). This restores compatibility for every nested vcpkg sub-build.
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest has rolled onto the VS 2026 / CMake 4.3 preview image,
        # where the frozen physfs 3.2.0 port (pulled in by Allegro) fails to
        # configure. Pin to windows-2022 to keep the proven VS 2022 + CMake 3.31
        # toolchain. ubuntu/macos still ship CMake 3.31 by default and build fine.
        os: [ubuntu-latest, windows-2022, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Persist vcpkg's compiled packages across runs. The key changes only when
      # the manifest or vcpkg pin does, so day-to-day pushes restore the whole
      # dependency set instead of rebuilding Allegro & co. from source.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      # vcpkg requires its binary-cache directory to exist beforehand.
      - name: Prepare vcpkg cache directory
        run: cmake -E make_directory ${{ github.workspace }}/vcpkg_cache

      # System packages vcpkg needs to build Allegro 5 from source on Linux
      # (X11/OpenGL/audio dev headers + autotools-based deps).
      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake autoconf-archive libtool pkg-config nasm \
            libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev

      # CMake (>=3.21) and Ninja ship preinstalled on the GitHub runners.
      # The CMakeLists bootstraps a pinned vcpkg itself, so no toolchain setup
      # is required here -- a classic configure/build works on every platform.
      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Upload demo
        uses: actions/upload-artifact@v4
        with:
          name: turbo-demo-${{ matrix.os }}
          path: build/bin/
          if-no-files-found: error
