name: build

on:
  push:
  pull_request:

# vcpkg builds Allegro 5 + transitive deps from source; cache the resulting
# binary packages across runs so CI doesn't rebuild them every time.
env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Wire up vcpkg's GitHub Actions binary cache (read by VCPKG_BINARY_SOURCES).
      - name: Set up vcpkg binary caching
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # System packages vcpkg needs to build Allegro 5 from source on Linux
      # (X11/OpenGL/audio dev headers + autotools-based deps).
      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake autoconf-archive libtool pkg-config nasm \
            libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev

      # CMake (>=3.21) and Ninja ship preinstalled on the GitHub runners.
      # The CMakeLists bootstraps a pinned vcpkg itself, so no toolchain setup
      # is required here -- a classic configure/build works on every platform.
      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Upload demo
        uses: actions/upload-artifact@v4
        with:
          name: turbo-demo-${{ matrix.os }}
          path: build/bin/
          if-no-files-found: error
